<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Smart Safe Home&Work - Web AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #hint {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 48, 79, 0.92);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      font-size: 15px;
    }

    #buttonLayer {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: none;
      pointer-events: none;
    }

    .riskButton {
      position: fixed;
      transform: translate(-50%, -50%);
      border: none;
      border-radius: 18px;
      padding: 11px 14px;
      background: rgba(0, 169, 207, 0.96);
      color: white;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0,0,0,0.38);
      cursor: pointer;
      pointer-events: auto;
      min-width: 120px;
      text-align: center;
    }

    .riskButton:active {
      transform: translate(-50%, -50%) scale(0.96);
      background: rgba(0, 48, 79, 0.96);
    }

    #btnStudio {
      left: 30%;
      top: 48%;
    }

    #btnBagno {
      left: 77%;
      top: 52%;
    }

    #btnSalotto {
      left: 62%;
      top: 67%;
    }

    #btnGiardino {
      left: 32%;
      top: 76%;
    }

    #btnCucina {
      left: 73%;
      top: 82%;
    }

    #btnSeminterrato {
      left: 22%;
      top: 88%;
    }

    #riskBox {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 540px;
      background: white;
      border: 4px solid #00304f;
      border-radius: 18px;
      padding: 18px;
      z-index: 10000;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    #riskBox h2 {
      margin: 0 0 10px;
      color: #00304f;
      font-size: 22px;
      line-height: 1.2;
    }

    #riskBox p {
      margin: 0;
      color: #222;
      font-size: 17px;
      line-height: 1.35;
    }

    #closeRisk {
      margin-top: 14px;
      background: #00304f;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="hint">Inquadra il roll-up</div>

  <div id="buttonLayer">
    <button id="btnStudio" class="riskButton" onclick="openRisk('stanza')">
      Stanza / postazione
    </button>

    <button id="btnBagno" class="riskButton" onclick="openRisk('bagno')">
      Bagno
    </button>

    <button id="btnSalotto" class="riskButton" onclick="openRisk('pulizie')">
      Pulizie e cavi
    </button>

    <button id="btnGiardino" class="riskButton" onclick="openRisk('terrazzo')">
      Terrazzo
    </button>

    <button id="btnCucina" class="riskButton" onclick="openRisk('scale')">
      Scale
    </button>

    <button id="btnSeminterrato" class="riskButton" onclick="openRisk('emergenza')">
      Emergenza
    </button>
  </div>

  <div id="riskBox">
    <h2 id="riskTitle"></h2>
    <p id="riskText"></p>
    <button id="closeRisk" onclick="closeRisk()">Chiudi</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

  </a-scene>

  <script>
    const riskTexts = {
      studio: {
        title: "Interferenze, ",
        text: "Salotto / Rischio da interferenza

La presenza contemporanea, nello stesso ambiente, di una postazione di lavoro, di una bambina e di un’attività di assistenza sanitaria domiciliare genera una condizione di rischio da interferenza. Attività diverse, ciascuna con proprie esigenze operative e propri fattori di rischio, si svolgono nello stesso spazio e possono sovrapporsi, riducendo il controllo dell’ambiente.

Il lavoratore può essere esposto a distrazioni, interruzioni frequenti, passaggi improvvisi, urti o inciampi, mentre l’attività assistenziale può richiedere movimenti, attrezzature, materiali o procedure che non sono compatibili con una postazione domestica improvvisata. La presenza della bambina aumenta ulteriormente l’imprevedibilità dello scenario, perché introduce richieste di attenzione, movimento e possibili interferenze con cavi, dispositivi e percorsi.

La sovrapposizione tra lavoro, cura e vita domestica può quindi amplificare i rischi presenti, rendendo necessario separare, per quanto possibile, gli spazi, mantenere liberi i percorsi e organizzare la postazione in modo da ridurre distrazioni e interferenze operative"
      },
      bagno: {
        title: "Bagno",
        text: "Nel bagno il rischio aumenta per la possibile presenza di acqua, pavimenti bagnati, prese elettriche, phon o altri dispositivi usati in modo improprio. La distrazione può favorire scivolamenti e rischio elettrico."
      },
      pulizie: {
        title: "Pulizie, cavi e multiprese",
        text: "Pulizie svolte vicino a computer, cavi, alimentatori e multiprese possono creare rischio di inciampo, scivolamento, contatto con liquidi e sovraccarico elettrico."
      },
      terrazzo: {
        title: "Terrazzo / ambiente esterno",
        text: "Lavorare all’esterno può esporre a luce diretta, abbagliamento, calore, superfici instabili, insetti, elementi biologici e perdita di concentrazione."
      },
      scale: {
        title: "Scale e percorsi",
        text: "Usare telefono, tablet o documenti mentre si percorrono le scale aumenta il rischio di caduta. Oggetti depositati sui percorsi possono ostacolare il passaggio e aggravare il rischio."
      },
      emergenza: {
        title: "Emergenza e presidi antincendio",
        text: "Estintori, vie di accesso e percorsi di emergenza devono rimanere visibili e liberi. Scatole, arredi o materiali accumulati possono ostacolare l’intervento in caso di emergenza."
      }
    };

    const target = document.getElementById("target");
    const hint = document.getElementById("hint");
    const buttonLayer = document.getElementById("buttonLayer");
    const riskBox = document.getElementById("riskBox");

    function openRisk(key) {
      const risk = riskTexts[key];

      document.getElementById("riskTitle").innerText = risk.title;
      document.getElementById("riskText").innerText = risk.text;

      riskBox.style.display = "block";
      buttonLayer.style.display = "none";
      hint.style.display = "none";
    }

    function closeRisk() {
      riskBox.style.display = "none";
      buttonLayer.style.display = "block";
      hint.style.display = "block";
    }

    target.addEventListener("targetFound", () => {
      hint.innerText = "Tocca un ambiente";
      hint.style.display = "block";
      buttonLayer.style.display = "block";
    });

    target.addEventListener("targetLost", () => {
      hint.innerText = "Inquadra di nuovo il roll-up";
      hint.style.display = "block";
      buttonLayer.style.display = "none";
      riskBox.style.display = "none";
    });
  </script>

</body>
</html>
