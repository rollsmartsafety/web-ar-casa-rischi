<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web AR Casa Rischi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #hint {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      z-index: 1000;
      font-size: 14px;
      text-align: center;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: 92%;
      max-width: 430px;
      z-index: 1000;
      display: none;
    }

    #buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .risk-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      background: rgba(255,255,255,0.95);
      color: #111;
    }

    #infoBox {
      background: rgba(0, 0, 0, 0.84);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      box-sizing: border-box;
    }

    #infoTitle {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #infoText {
      font-size: 15px;
      line-height: 1.4;
    }

    #closeBtn {
      margin-top: 10px;
      border: none;
      background: white;
      color: black;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="hint">Inquadra il roll-up. Quando la casa viene riconosciuta, compariranno i pulsanti dei rischi.</div>

  <div id="controls">
    <div id="buttons">
      <button class="risk-btn" onclick="apriScheda('Cucina', 'La distrazione durante la cottura, insieme a oggetti fuori posto e cavi visibili, può aumentare il rischio di ustioni, urti o inciampo.')">Cucina</button>

      <button class="risk-btn" onclick="apriScheda('Salotto', 'Lavorare con il portatile sulle gambe e con continue interferenze familiari può favorire posture scorrette, affaticamento e calo dell attenzione.')">Salotto</button>

      <button class="risk-btn" onclick="apriScheda('Scale', 'Oggetti lasciati sui gradini o passaggi poco liberi possono aumentare il rischio di inciampo e caduta.')">Scale</button>
    </div>

    <div id="infoBox">
      <div id="infoTitle"></div>
      <div id="infoText"></div>
      <button id="closeBtn">Chiudi</button>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <!-- ETICHETTE AR -->
      <!-- Modifica questi position per spostarle -->
      <a-text
        value="CUCINA"
        color="#FF3B30"
        align="center"
        width="1.8"
        position="0.30 -0.10 0"
        scale="0.7 0.7 0.7">
      </a-text>

      <a-text
        value="SALOTTO"
        color="#FFD60A"
        align="center"
        width="1.8"
        position="0.28 0.12 0"
        scale="0.7 0.7 0.7">
      </a-text>

      <a-text
        value="SCALE"
        color="#FF9F0A"
        align="center"
        width="1.8"
        position="0.02 -0.20 0"
        scale="0.7 0.7 0.7">
      </a-text>

    </a-entity>
  </a-scene>

  <script>
    const controls = document.getElementById("controls");
    const infoBox = document.getElementById("infoBox");
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const closeBtn = document.getElementById("closeBtn");
    const target = document.getElementById("target");

    function apriScheda(titolo, testo) {
      infoTitle.textContent = titolo;
      infoText.textContent = testo;
      infoBox.style.display = "block";
    }

    closeBtn.addEventListener("click", () => {
      infoBox.style.display = "none";
    });

    target.addEventListener("targetFound", () => {
      controls.style.display = "block";
    });

    target.addEventListener("targetLost", () => {
      controls.style.display = "none";
      infoBox.style.display = "none";
    });
  </script>
</body>
</html>
