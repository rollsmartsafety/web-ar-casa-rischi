<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Smart Safe Home&Work - Web AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #hint {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 48, 79, 0.92);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      font-size: 15px;
      max-width: 90%;
    }

    /* BARRA ORDINATA DEI BOTTONI IN BASSO */
    #buttonLayer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 94%;
      max-width: 560px;
      z-index: 9998;
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      pointer-events: auto;
    }

    .riskButton {
      border: none;
      border-radius: 18px;
      padding: 12px 10px;
      background: rgba(0, 169, 207, 0.96);
      color: white;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0,0,0,0.38);
      cursor: pointer;
      pointer-events: auto;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .riskButton:active {
      transform: scale(0.97);
      background: rgba(0, 48, 79, 0.96);
    }

    #riskBox {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 540px;
      background: white;
      border: 4px solid #00304f;
      border-radius: 18px;
      padding: 18px;
      z-index: 10000;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    #riskBox h2 {
      margin: 0 0 10px;
      color: #00304f;
      font-size: 22px;
      line-height: 1.2;
    }

    #riskBox p {
      margin: 0;
      color: #222;
      font-size: 17px;
      line-height: 1.35;
    }

    #closeRisk {
      margin-top: 14px;
      background: #00304f;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="hint">Inquadra il roll-up</div>

  <div id="buttonLayer">

    <button id="btnStudio" class="riskButton" onclick="openRisk('studio')">
      STUDIO
    </button>

    <button id="btnBagno" class="riskButton" onclick="openRisk('bagno')">
      BAGNO
    </button>

    <button id="btnCucina" class="riskButton" onclick="openRisk('cucina')">
      CUCINA
    </button>

    <button id="btnSalotto" class="riskButton" onclick="openRisk('salotto')">
      SALOTTO
    </button>

    <button id="btnGiardino" class="riskButton" onclick="openRisk('giardino')">
      GIARDINO
    </button>

    <button id="btnSeminterrato" class="riskButton" onclick="openRisk('seminterrato')">
      SEMINTERRATO
    </button>

  </div>

  <div id="riskBox">
    <h2 id="riskTitle"></h2>
    <p id="riskText"></p>
    <button id="closeRisk" onclick="closeRisk()">Chiudi</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

  </a-scene>

  <script>
    const riskTexts = {
      studio: {
        title: "STUDIO",
        text: "Nello studio la postazione di lavoro può presentare rischi legati a postura non corretta, illuminazione non adeguata, uso prolungato dei dispositivi digitali, cavi esposti e organizzazione non sicura dello spazio operativo."
      },

      bagno: {
        title: "BAGNO",
        text: "Nel bagno la presenza di acqua, pavimenti bagnati, prese elettriche e dispositivi come phon o caricabatterie può determinare condizioni di rischio elettrico, scivolamento e caduta, soprattutto in caso di distrazione."
      },

      cucina: {
        title: "CUCINA",
        text: "In cucina la sovrapposizione tra attività domestiche e lavoro può generare distrazioni, interferenze, rischio di urti, scottature, tagli o contatto accidentale con liquidi e superfici calde. La presenza di alimenti vicino ai dispositivi può inoltre danneggiare la postazione."
      },

      salotto: {
        title: "SALOTTO",
        text: "Nel salotto la presenza contemporanea di lavoro digitale, vita domestica, bambini e attività di assistenza può generare rischio da interferenza. Attività diverse si sovrappongono nello stesso spazio, aumentando distrazione, interruzioni, urti, inciampi e difficoltà di controllo dell’ambiente."
      },

      giardino: {
        title: "GIARDINO",
        text: "Nel giardino o negli spazi esterni il lavoro può essere condizionato da luce diretta, abbagliamento, calore, superfici instabili, insetti, elementi biologici e distrazioni ambientali. La postazione può risultare meno stabile e meno protetta rispetto a uno spazio interno."
      },

      seminterrato: {
        title: "SEMINTERRATO",
        text: "Nel seminterrato possono essere presenti rischi legati a scarsa illuminazione, umidità, muffa, materiali depositati, percorsi ingombri, cavi, scale e difficoltà di aerazione. L’ambiente può aumentare il rischio di inciampo, caduta e riduzione del comfort lavorativo."
      }
    };

    const target = document.getElementById("target");
    const hint = document.getElementById("hint");
    const buttonLayer = document.getElementById("buttonLayer");
    const riskBox = document.getElementById("riskBox");

    function openRisk(key) {
      const risk = riskTexts[key];

      document.getElementById("riskTitle").innerText = risk.title;
      document.getElementById("riskText").innerText = risk.text;

      riskBox.style.display = "block";
      buttonLayer.style.display = "none";
      hint.style.display = "none";
    }

    function closeRisk() {
      riskBox.style.display = "none";
      buttonLayer.style.display = "grid";
      hint.style.display = "block";
      hint.innerText = "Tocca un ambiente";
    }

    target.addEventListener("targetFound", () => {
      hint.innerText = "Tocca un ambiente";
      hint.style.display = "block";
      buttonLayer.style.display = "grid";
    });

    target.addEventListener("targetLost", () => {
      hint.innerText = "Inquadra di nuovo il roll-up";
      hint.style.display = "block";
      buttonLayer.style.display = "none";
      riskBox.style.display = "none";
    });
  </script>

</body>
</html>
