<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web AR Casa Rischi</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET -->
 <a-entity mindar-image-target="targetIndex: 0">

  <!-- CUCINA -->
  <a-text 
    value="Distrazione durante la cottura"
    color="red"
    align="center"
    width="2"
    position="-0.5 0.5 0">
  </a-text>

  <!-- SALOTTO -->
  <a-text 
    value="Postura scorretta e interferenze"
    color="yellow"
    align="center"
    width="2"
    position="0.5 0.2 0">
  </a-text>

  <!-- SCALE -->
  <a-text 
    value="Rischio di inciampo"
    color="orange"
    align="center"
    width="2"
    position="0 -0.3 0">
  </a-text>

</a-entity>

  </a-scene>
</body>
</html>
