<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web AR Casa Rischi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body { margin: 0; font-family: Arial, sans-serif; overflow: hidden; }
    #infoBox {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 430px;
      background: rgba(0,0,0,0.88);
      color: white;
      padding: 16px;
      border-radius: 16px;
      z-index: 99999;
      display: none;
      font-size: 15px;
      line-height: 1.4;
    }

    #infoTitle {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #infoTitle { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    #closeBtn {
      margin-top: 12px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div id="infoBox">
    <div id="infoTitle"></div>
    <div id="infoText"></div>
    <button id="closeBtn">Chiudi</button>
  </div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  cursor="rayOrigin: mouse; fuse: false"
  raycaster="objects: .clickable">
  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    cursor="rayOrigin: mouse; fuse: false"
    raycaster="objects: .clickable; far: 100000">

<a-camera
  position="0 0 0"
  look-controls="enabled: false">
</a-camera>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <!-- 1. Riquadro alto sinistra: schermo -->
      <a-circle id="p1" class="clickable" color="red" radius="0.025" position="-0.19 -0.02 0.03"></a-circle>

      <!-- 2. Bagno: acqua + phon/cavo -->
      <a-circle id="p2" class="clickable" color="red" radius="0.025" position="0.31 -0.02 0.03"></a-circle>

      <!-- 3. Cucina: pallone vicino alla mamma, più in alto -->
      <a-circle id="p3" class="clickable" color="red" radius="0.025" position="-0.18 -0.34 0.03"></a-circle>

      <!-- 4. Salotto animali: filo tra gatto e bassotto -->
      <a-circle id="p4" class="clickable" color="red" radius="0.025" position="0.28 -0.34 0.03"></a-circle>

      <!-- 5. Salotto animali: quadro -->
      <a-circle id="p5" class="clickable" color="red" radius="0.025" position="0.22 -0.24 0.03"></a-circle>

      <!-- 6. Giardino: vicino al sole -->
      <a-circle id="p6" class="clickable" color="red" radius="0.025" position="-0.08 -0.58 0.03"></a-circle>

      <!-- 7. Scale: macchia nera -->
      <a-circle id="p7" class="clickable" color="red" radius="0.025" position="0.36 -0.58 0.03"></a-circle>

      <a-circle id="p1" color="red" radius="0.025" position="-0.19 -0.02 0.03"></a-circle>
      <a-circle id="p2" color="red" radius="0.025" position="0.31 -0.02 0.03"></a-circle>
      <a-circle id="p3" color="red" radius="0.025" position="-0.18 -0.34 0.03"></a-circle>
      <a-circle id="p4" color="red" radius="0.025" position="0.28 -0.34 0.03"></a-circle>
      <a-circle id="p5" color="red" radius="0.025" position="0.22 -0.24 0.03"></a-circle>
      <a-circle id="p6" color="red" radius="0.025" position="-0.08 -0.58 0.03"></a-circle>
      <a-circle id="p7" color="red" radius="0.025" position="0.36 -0.58 0.03"></a-circle>

      <!-- hitbox più grande per facilitare il tap su mobile -->
      <a-circle id="h1" class="clickable" data-point="p1" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="-0.19 -0.02 0.031"></a-circle>
      <a-circle id="h2" class="clickable" data-point="p2" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="0.31 -0.02 0.031"></a-circle>
      <a-circle id="h3" class="clickable" data-point="p3" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="-0.18 -0.34 0.031"></a-circle>
      <a-circle id="h4" class="clickable" data-point="p4" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="0.28 -0.34 0.031"></a-circle>
      <a-circle id="h5" class="clickable" data-point="p5" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="0.22 -0.24 0.031"></a-circle>
      <a-circle id="h6" class="clickable" data-point="p6" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="-0.08 -0.58 0.031"></a-circle>
      <a-circle id="h7" class="clickable" data-point="p7" material="transparent: true; opacity: 0.01; side: double" radius="0.09" position="0.36 -0.58 0.031"></a-circle>
    </a-entity>
  </a-scene>

  <script>
    const infoBox = document.getElementById("infoBox");
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const closeBtn = document.getElementById("closeBtn");

    function apriScheda(titolo, testo) {
      infoTitle.textContent = titolo;
      infoText.textContent = testo;
    const rischi = {
      p1: {
        titolo: "Interferenze lavoro-famiglia",
        testo: "La sovrapposizione tra lavoro agile, cura dei figli e presenza di persone fragili può ridurre la concentrazione, aumentare gli errori e generare interferenze organizzative e relazionali."
      },
      p2: {
        titolo: "Rischio elettrico",
        testo: "L’uso di dispositivi elettrici vicino ad acqua o pavimenti bagnati aumenta il rischio di contatto elettrico e di scivolamento."
      },
      p3: {
        titolo: "Disordine e inciampo",
        testo: "Oggetti lasciati a terra o in zone di passaggio, come giochi o palloni, possono provocare inciampo durante le attività domestiche e lavorative."
      },
      p4: {
        titolo: "Cavi e animali domestici",
        testo: "Cavi a terra e animali in movimento possono creare interferenze, cadute, danni ai dispositivi e perdita accidentale di dati."
      },
      p5: {
        titolo: "Postazione improvvisata",
        testo: "Lavorare in ambienti domestici non organizzati può favorire distrazione, postura scorretta e interferenze con le attività di casa."
      },
      p6: {
        titolo: "Esposizione esterna",
        testo: "Lavorare all’aperto può esporre a calore, abbagliamento, insetti e condizioni ambientali non controllate."
      },
      p7: {
        titolo: "Umidità e degrado ambientale",
        testo: "Macchie, muffe o degrado degli ambienti domestici possono indicare condizioni non idonee allo svolgimento sicuro e salubre del lavoro."
      }
    };

    function apriScheda(idPunto) {
      const scheda = rischi[idPunto];
      if (!scheda) return;
      infoTitle.textContent = scheda.titolo;
      infoText.textContent = scheda.testo;
      infoBox.style.display = "block";
    }

    closeBtn.addEventListener("click", function() {
      infoBox.style.display = "none";
    });

    document.getElementById("p1").addEventListener("click", function() {
      apriScheda(
        "Interferenze lavoro-famiglia",
        "La sovrapposizione tra lavoro agile, cura dei figli e presenza di persone fragili può ridurre la concentrazione, aumentare gli errori e generare interferenze organizzative e relazionali."
      );
    });

    document.getElementById("p2").addEventListener("click", function() {
      apriScheda(
        "Rischio elettrico",
        "L’uso di dispositivi elettrici vicino ad acqua o pavimenti bagnati aumenta il rischio di contatto elettrico e di scivolamento."
      );
    });

    document.getElementById("p3").addEventListener("click", function() {
      apriScheda(
        "Disordine e inciampo",
        "Oggetti lasciati a terra o in zone di passaggio, come giochi o palloni, possono provocare inciampo durante le attività domestiche e lavorative."
      );
    });

    document.getElementById("p4").addEventListener("click", function() {
      apriScheda(
        "Cavi e animali domestici",
        "Cavi a terra e animali in movimento possono creare interferenze, cadute, danni ai dispositivi e perdita accidentale di dati."
      );
    });

    document.getElementById("p5").addEventListener("click", function() {
      apriScheda(
        "Postazione improvvisata",
        "Lavorare in ambienti domestici non organizzati può favorire distrazione, postura scorretta e interferenze con le attività di casa."
      );
    });

    document.getElementById("p6").addEventListener("click", function() {
      apriScheda(
        "Esposizione esterna",
        "Lavorare all’aperto può esporre a calore, abbagliamento, insetti e condizioni ambientali non controllate."
      );
    });

    document.getElementById("p7").addEventListener("click", function() {
      apriScheda(
        "Umidità e degrado ambientale",
        "Macchie, muffe o degrado degli ambienti domestici possono indicare condizioni non idonee allo svolgimento sicuro e salubre del lavoro."
      );
    document.querySelectorAll(".clickable").forEach(function(el) {
      const idPunto = el.id || el.getAttribute("data-point");
      ["click", "mousedown", "touchstart"].forEach(function(eventName) {
        el.addEventListener(eventName, function() {
          apriScheda(idPunto);
        });
      });
    });
  </script>

</body>
</html>
