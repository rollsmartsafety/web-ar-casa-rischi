<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Smart Safe Home&Work - Web AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #hint {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 48, 79, 0.92);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      z-index: 9999;
      font-weight: bold;
      text-align: center;
      font-size: 15px;
    }

    #tapLayer {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
    }

    .tapButton {
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 0, 0, 0.01);
      border: none;
      pointer-events: auto;
      cursor: pointer;
    }

    #riskBox {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 520px;
      background: #ffffff;
      border: 4px solid #00304f;
      border-radius: 18px;
      padding: 18px;
      z-index: 10000;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    #riskBox h2 {
      margin: 0 0 10px;
      color: #00304f;
      font-size: 22px;
      line-height: 1.2;
    }

    #riskBox p {
      margin: 0;
      color: #222;
      font-size: 17px;
      line-height: 1.35;
    }

    #closeRisk {
      margin-top: 14px;
      background: #00a9cf;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="hint">Inquadra il roll-up</div>
<div id="tapLayer"></div>

<div id="riskBox">
  <h2 id="riskTitle"></h2>
  <p id="riskText"></p>
  <button id="closeRisk">Chiudi</button>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

</a-scene>

<script>
  const posterWidth = 870;
  const posterHeight = 2048;

  const arWidth = 1;
  const arHeight = posterHeight / posterWidth;

  const risks = [
    { x:147, y:1075, title:"Interferenze domestiche", text:"La presenza contemporanea di bambini, animali o altre persone può generare distrazioni, urti e interferenze con l’attività lavorativa." },
    { x:222, y:1013, title:"Uso improprio di dispositivi", text:"L’uso di dispositivi digitali durante altre attività può ridurre l’attenzione, aumentare il rischio di urti e interferire con la sicurezza dell’ambiente domestico." },
    { x:349, y:1062, title:"Postazione improvvisata", text:"Schermi, cavi e arredi non pensati per il lavoro possono favorire posture scorrette, inciampi e riduzione dell’attenzione." },
    { x:681, y:1172, title:"Rischio elettrico in bagno", text:"L’uso di phon o dispositivi elettrici vicino ad acqua, pavimenti bagnati o prese non protette aumenta il rischio elettrico." },
    { x:682, y:1260, title:"Pavimento bagnato", text:"L’acqua sul pavimento può provocare scivolamenti, cadute e urti, soprattutto se l’attenzione è assorbita da telefono o strumenti digitali." },
    { x:167, y:1314, title:"Oggetti a terra", text:"Borse, giochi, panni o oggetti lasciati nei percorsi possono diventare ostacoli e aumentare il rischio di inciampo." },
    { x:242, y:1371, title:"Postura non corretta", text:"Una postazione non regolata correttamente può causare affaticamento visivo, sovraccarico muscoloscheletrico e posture incongrue." },
    { x:329, y:1321, title:"Alimenti vicino al computer", text:"Mangiare o bere vicino a computer e dispositivi può causare danni alle apparecchiature, distrazioni e contaminazione della postazione." },
    { x:140, y:1403, title:"Oggetti instabili", text:"Oggetti appoggiati in modo precario o usati impropriamente possono cadere e colpire persone o apparecchiature." },
    { x:517, y:1432, title:"Pulizie e lavoro digitale", text:"Svolgere attività di pulizia vicino a cavi, multiprese e dispositivi accesi può creare condizioni di scivolamento e rischio elettrico." },
    { x:634, y:1442, title:"Multiprese e cavi esposti", text:"Cavi attraversati, multiprese sovraccariche o non fissate possono generare inciampi, surriscaldamenti e interruzioni improvvise." },
    { x:780, y:1351, title:"Animali vicino ai cavi", text:"Animali domestici che giocano o tirano cavi e multiprese possono provocare cadute, scollegamenti improvvisi o rischio elettrico." },
    { x:790, y:1505, title:"Muffa e ambiente insalubre", text:"Muffa, umidità o scarsa qualità dell’ambiente possono incidere sul comfort, sulla concentrazione e sulla salubrità dello spazio di lavoro." },
    { x:349, y:1507, title:"Abbagliamento e calore", text:"Luce solare diretta, riflessi sullo schermo e calore eccessivo possono aumentare affaticamento visivo, stress termico e distrazione." },
    { x:188, y:1554, title:"Rischi biologici all’aperto", text:"Insetti, nidi, animali o elementi naturali possono rappresentare rischi non previsti quando si lavora in spazi esterni." },
    { x:459, y:1581, title:"Postazione esterna instabile", text:"Tavolini, sedie leggere o superfici irregolari possono rendere instabile la postazione e favorire cadute di dispositivi o perdita di equilibrio." },
    { x:628, y:1662, title:"Scale e distrazione", text:"Usare telefono, tablet o documenti mentre si percorrono le scale aumenta il rischio di caduta, soprattutto in ambienti con oggetti depositati." },
    { x:120, y:1720, title:"Presidi antincendio ostruiti", text:"Gli estintori e le vie di accesso devono rimanere visibili e liberi. Oggetti e scatole possono ostacolare l’intervento in emergenza." }
  ];

  const target = document.getElementById("target");
  const tapLayer = document.getElementById("tapLayer");

  function pixelToAR(px, py) {
    return {
      x: (px / posterWidth - 0.5) * arWidth,
      y: (0.5 - py / posterHeight) * arHeight
    };
  }

  function openRisk(risk) {
    document.getElementById("riskTitle").innerText = risk.title;
    document.getElementById("riskText").innerText = risk.text;
    document.getElementById("riskBox").style.display = "block";
  }

  document.getElementById("closeRisk").onclick = () => {
    document.getElementById("riskBox").style.display = "none";
  };

  risks.forEach((risk, index) => {
    const pos = pixelToAR(risk.x, risk.y);

    const dot = document.createElement("a-circle");
    dot.setAttribute("position", `${pos.x} ${pos.y} 0.04`);
    dot.setAttribute("radius", "0.026");
    dot.setAttribute("color", "#ff0000");
    dot.setAttribute("opacity", "0.95");
    dot.setAttribute("material", "shader: flat; side: double");
    dot.setAttribute("animation__pulse", "property: scale; dir: alternate; dur: 700; loop: true; to: 1.25 1.25 1.25");
    target.appendChild(dot);

    const btn = document.createElement("button");
    btn.className = "tapButton";
    btn.setAttribute("aria-label", risk.title);
    btn.onclick = () => openRisk(risk);
    btn.ontouchstart = (e) => {
      e.preventDefault();
      openRisk(risk);
    };
    tapLayer.appendChild(btn);
    risk.button = btn;
    risk.arPos = pos;
  });

  function updateButtons() {
    risks.forEach((risk) => {
      const x = risk.x / posterWidth * window.innerWidth;
      const y = risk.y / posterHeight * window.innerHeight;

      risk.button.style.left = x + "px";
      risk.button.style.top = y + "px";
    });
  }

  window.addEventListener("resize", updateButtons);
  updateButtons();

  target.addEventListener("targetFound", () => {
    document.getElementById("hint").innerText = "Tocca un pallino rosso per leggere il rischio";
    tapLayer.style.display = "block";
  });

  target.addEventListener("targetLost", () => {
    document.getElementById("hint").innerText = "Inquadra di nuovo il roll-up";
    tapLayer.style.display = "none";
    document.getElementById("riskBox").style.display = "none";
  });

  tapLayer.style.display = "none";
</script>

</body>
</html>
