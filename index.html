<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Smart Safe Home&Work - Web AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #hint {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 48, 79, 0.92);
      color: white;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: bold;
      text-align: center;
      font-size: 16px;
      max-width: 92%;
    }

    #buttonLayer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 94%;
      max-width: 620px;
      z-index: 9998;
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      pointer-events: auto;
    }

    .riskButton {
      border: none;
      border-radius: 20px;
      padding: 18px 10px;
      background: rgba(0, 169, 207, 0.97);
      color: white;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 5px 18px rgba(0,0,0,0.45);
      cursor: pointer;
      pointer-events: auto;
      text-align: center;
      letter-spacing: 0.5px;
      min-height: 58px;
    }

    .riskButton:active {
      transform: scale(0.97);
      background: rgba(0, 48, 79, 0.97);
    }

    #riskBox {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      max-height: 72vh;
      overflow-y: auto;
      background: white;
      border: 4px solid #00304f;
      border-radius: 20px;
      padding: 20px;
      z-index: 10000;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }

    #riskTitle {
      margin: 0 0 14px;
      color: #00304f;
      font-size: 24px;
      line-height: 1.2;
    }

    #riskText {
      color: #222;
      font-size: 17px;
      line-height: 1.4;
    }

    #riskText p {
      margin: 0 0 14px;
    }

    #riskText strong {
      color: #00304f;
      font-weight: 800;
    }

    #closeRisk {
      margin-top: 10px;
      background: #00304f;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="hint">Inquadra il roll-up</div>

  <div id="buttonLayer">
    <button class="riskButton" onclick="openRisk('studio')">STUDIO</button>
    <button class="riskButton" onclick="openRisk('bagno')">BAGNO</button>
    <button class="riskButton" onclick="openRisk('cucina')">CUCINA</button>
    <button class="riskButton" onclick="openRisk('salotto')">SALOTTO</button>
    <button class="riskButton" onclick="openRisk('giardino')">GIARDINO</button>
    <button class="riskButton" onclick="openRisk('seminterrato')">SEMINTERRATO</button>
  </div>

  <div id="riskBox">
    <h2 id="riskTitle"></h2>
    <div id="riskText"></div>
    <button id="closeRisk" onclick="closeRisk()">Chiudi</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

  </a-scene>

  <script>
    const riskTexts = {
      studio: {
        title: "STUDIO",
        html:
          "<p><strong>Interferenze:</strong> sovrapposizione nello stesso luogo o nello stesso arco temporale di attività lavorative diverse che possono influire reciprocamente sui rischi e sulle prestazioni, generando interruzioni, errori o peggioramento della sicurezza.</p>" +

          "<p><strong>Presenze familiari:</strong> presenza di persone non lavoratrici, familiari, conviventi, ospiti, nello stesso ambiente di lavoro agile la cui vicinanza o intervento può modificare il contesto operativo e aumentare i rischi di disturbo o intralcio.</p>" +

          "<p><strong>Distrazioni:</strong> stimoli esterni o interni, rumori, richieste verbali, dispositivi personali, attività domestiche, che sottraggono attenzione al lavoratore, riducendo concentrazione e aumentando la probabilità di errori.</p>" +

          "<p><strong>Postazione non idonea:</strong> luogo o attrezzatura di lavoro non conformi ai requisiti ergonomici o di sicurezza, sedia o scrivania inadeguata, schermo mal posizionato, illuminazione scarsa, impianto elettrico non conforme, che possono causare disturbi muscolo-scheletrici, affaticamento visivo o rischi elettrici.</p>"
      },

      bagno: {
        title: "BAGNO",
        html:
          "<p>Nel lavoro agile, anche l’accesso ai servizi igienici e le attività connesse a esigenze fisiologiche rientrano nell’uso dello spazio di lavoro domestico, pur non costituendo attività lavorativa in senso stretto.</p>" +

          "<p><strong>Rischio elettrico:</strong> uso di asciugacapelli e cavo elettrico in un ambiente umido, con possibilità di folgorazione o corto circuito.</p>" +

          "<p><strong>Rischio di scivolamento:</strong> presenza di acqua sul pavimento che può causare cadute.</p>" +

          "<p><strong>Rischio di inciampo:</strong> cavo lasciato a terra che può ostacolare il passaggio.</p>"
      },

      cucina: {
        title: "CUCINA",
        html:
          "<p><strong>Sovrapposizione vita-lavoro:</strong> la compresenza di attività lavorative, presenze domestiche e attività familiari può compromettere attenzione e vigilanza. La gestione simultanea di compiti diversi incide sia sulla produttività sia sulla sicurezza.</p>" +

          "<p><strong>Rischio di ustione o incendio:</strong> fornelli, bollitori, pentole e fonti di calore possono rappresentare un pericolo se lasciati incustoditi o gestiti contemporaneamente all’attività lavorativa.</p>" +

          "<p><strong>Rischio di inciampo:</strong> sedie, libri, cesti, palloni, giocattoli o altri oggetti lasciati a terra possono ostacolare il passaggio e causare cadute o urti.</p>" +

          "<p><strong>Rischio per la postazione:</strong> liquidi, alimenti e superfici non idonee vicino a computer, cavi e dispositivi possono danneggiare le attrezzature e aumentare il rischio elettrico o di malfunzionamento.</p>" +

          "<p><strong>Distrazioni:</strong> rumori, richieste familiari, preparazione dei pasti e uso simultaneo di dispositivi personali possono sottrarre attenzione al lavoro, aumentando la probabilità di errori e comportamenti non sicuri.</p>"
      },

      salotto: {
        title: "SALOTTO",
        html:
          "<p><strong>Interferenze tra attività:</strong> la presenza contemporanea di lavoro digitale, pulizie domestiche, animali e altre attività nello stesso ambiente può modificare il contesto operativo e aumentare il rischio di distrazioni, interruzioni e comportamenti non sicuri.</p>" +

          "<p><strong>Rischio biologico:</strong> la presenza di animali domestici può comportare esposizione a peli, allergeni, saliva o residui organici. Il movimento improvviso degli animali può inoltre interferire con cavi, dispositivi e percorsi, aumentando il rischio di inciampo o caduta.</p>" +

          "<p><strong>Rischio chimico:</strong> l’uso di detergenti, disinfettanti o altre sostanze per la pulizia nello stesso ambiente in cui si lavora può esporre a vapori, schizzi o contatti accidentali, soprattutto se i prodotti non sono conservati o utilizzati correttamente.</p>" +

          "<p><strong>Posture scorrette:</strong> lavorare sul divano o con il computer appoggiato sulle gambe può favorire posture non ergonomiche, affaticamento muscolo-scheletrico, tensioni a collo, spalle e schiena e riduzione del comfort visivo.</p>" +

          "<p><strong>Cavi e multiprese:</strong> cavi elettrici e multiprese lasciati a terra o lungo le zone di passaggio possono causare inciampi, scollegamenti improvvisi e danneggiamento dei dispositivi.</p>" +

          "<p><strong>Rischio elettrico e folgorazione:</strong> la presenza di acqua sul pavimento, in prossimità di cavi, spine e multiprese, può determinare condizioni di grave rischio elettrico, con possibilità di corto circuito, contatto accidentale con parti in tensione e folgorazione.</p>"
      },

      giardino: {
        title: "GIARDINO",
        html:
          "<p><strong>Rischio microclimatico:</strong> lavorare all’aperto può esporre a temperature elevate, irraggiamento solare diretto, calore e abbagliamento. Queste condizioni possono causare affaticamento, riduzione della concentrazione, discomfort termico e difficoltà nella corretta visualizzazione dello schermo.</p>" +

          "<p><strong>Rischio biologico da insetti:</strong> la presenza di insetti, api, vespe o altri animali può determinare punture, reazioni allergiche, distrazioni improvvise e movimenti bruschi, con possibile perdita di controllo della postazione o degli strumenti di lavoro.</p>" +

          "<p><strong>Rischio di inciampo e caduta:</strong> buche, terreno irregolare, radici, oggetti lasciati a terra o zone non livellate possono ostacolare il passaggio e causare cadute, urti o perdita di equilibrio.</p>" +

          "<p><strong>Postazione non adeguata:</strong> tavolini instabili, sedie non ergonomiche, assenza di piano di lavoro idoneo e collocazione improvvisata dei dispositivi possono favorire posture scorrette, affaticamento muscolo-scheletrico e rischio di caduta o danneggiamento delle attrezzature.</p>" +

          "<p><strong>Distrazioni ambientali:</strong> rumori, animali, movimento di insetti, luce intensa e condizioni esterne variabili possono sottrarre attenzione al lavoratore, aumentando la probabilità di errori e comportamenti non sicuri.</p>"
      },

      seminterrato: {
        title: "SEMINTERRATO",
        html:
          "<p><strong>Rischio di caduta sulle scale:</strong> l’uso di scale interne durante l’attività lavorativa o nelle pause può comportare rischio di inciampo, perdita di equilibrio e caduta, soprattutto in presenza di distrazioni, oggetti depositati lungo il percorso o illuminazione non adeguata.</p>" +

          "<p><strong>Ambiente non idoneo al lavoro agile:</strong> seminterrati, cantine, box, soffitte o locali di deposito possono non essere compatibili con lo svolgimento della prestazione lavorativa. In molte informative aziendali questi ambienti sono espressamente esclusi o sconsigliati, perché possono presentare condizioni non adeguate sotto il profilo della sicurezza, della salubrità, dell’illuminazione, dell’aerazione e dell’ergonomia.</p>" +

          "<p><strong>Muffa e umidità:</strong> la presenza di muffa sulle pareti, umidità o scarsa aerazione può compromettere la qualità dell’ambiente interno, generare discomfort e rappresentare un fattore di rischio per la salubrità dello spazio di lavoro.</p>" +

          "<p><strong>Polvere e materiali depositati:</strong> scatole, documenti, materiali accumulati e polvere possono ostacolare i percorsi, aumentare il rischio di inciampo e rendere l’ambiente meno adatto a un’attività lavorativa continuativa.</p>" +

          "<p><strong>Rischio incendio e gestione dell’emergenza:</strong> la presenza di un estintore non elimina il rischio e non trasforma il lavoratore in un addetto antincendio. In caso di principio d’incendio, la priorità è mantenere la calma, interrompere l’uso delle apparecchiature se possibile senza esporsi a pericolo, avvisare le persone presenti, chiamare i soccorsi e allontanarsi in sicurezza. L’eventuale uso di mezzi di estinzione deve essere limitato a situazioni iniziali, circoscritte e affrontabili senza rischio personale, evitando sempre l’uso di acqua su apparecchiature o impianti elettrici.</p>"
      }
    };

    const target = document.getElementById("target");
    const hint = document.getElementById("hint");
    const buttonLayer = document.getElementById("buttonLayer");
    const riskBox = document.getElementById("riskBox");
    const riskTitle = document.getElementById("riskTitle");
    const riskText = document.getElementById("riskText");

    function openRisk(key) {
      const risk = riskTexts[key];

      riskTitle.innerText = risk.title;
      riskText.innerHTML = risk.html;

      riskBox.scrollTop = 0;
      riskBox.style.display = "block";
      buttonLayer.style.display = "none";
      hint.style.display = "none";
    }

    function closeRisk() {
      riskBox.style.display = "none";
      buttonLayer.style.display = "grid";
      hint.style.display = "block";
      hint.innerText = "Tocca un ambiente";
    }

    target.addEventListener("targetFound", function () {
      hint.innerText = "Tocca un ambiente";
      hint.style.display = "block";
      buttonLayer.style.display = "grid";
    });

    target.addEventListener("targetLost", function () {
      hint.innerText = "Inquadra di nuovo il roll-up";
      hint.style.display = "block";
      buttonLayer.style.display = "none";
      riskBox.style.display = "none";
    });
  </script>

</body>
</html>
