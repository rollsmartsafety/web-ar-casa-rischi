<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Smart Safe Home&Work - Web AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #hint {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 48, 79, 0.92);
      color: white;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: bold;
      text-align: center;
      font-size: 16px;
      max-width: 92%;
    }

    #buttonLayer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 94%;
      max-width: 620px;
      z-index: 9998;
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      pointer-events: auto;
    }

    .riskButton {
      border: none;
      border-radius: 20px;
      padding: 18px 10px;
      background: rgba(0, 169, 207, 0.97);
      color: white;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 5px 18px rgba(0,0,0,0.45);
      cursor: pointer;
      pointer-events: auto;
      text-align: center;
      letter-spacing: 0.5px;
      min-height: 58px;
    }

    .riskButton:active {
      transform: scale(0.97);
      background: rgba(0, 48, 79, 0.97);
    }

    #riskBox {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      max-height: 72vh;
      overflow-y: auto;
      background: white;
      border: 4px solid #00304f;
      border-radius: 20px;
      padding: 20px;
      z-index: 10000;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }

    #riskTitle {
      margin: 0 0 14px;
      color: #00304f;
      font-size: 24px;
      line-height: 1.2;
    }

    #riskText {
      color: #222;
      font-size: 17px;
      line-height: 1.4;
    }

    #riskText p {
      margin: 0 0 14px;
    }

    #riskText strong {
      color: #00304f;
      font-weight: 800;
    }

    #closeRisk {
      margin-top: 10px;
      background: #00304f;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="hint">Inquadra il roll-up</div>

  <div id="buttonLayer">
    <button class="riskButton" onclick="openRisk('studio')">STUDIO</button>
    <button class="riskButton" onclick="openRisk('bagno')">BAGNO</button>
    <button class="riskButton" onclick="openRisk('cucina')">CUCINA</button>
    <button class="riskButton" onclick="openRisk('salotto')">SALOTTO</button>
    <button class="riskButton" onclick="openRisk('giardino')">GIARDINO</button>
    <button class="riskButton" onclick="openRisk('seminterrato')">SEMINTERRATO</button>
  </div>

  <div id="riskBox">
    <h2 id="riskTitle"></h2>
    <div id="riskText"></div>
    <button id="closeRisk" onclick="closeRisk()">Chiudi</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

  </a-scene>

  <script>
    const riskTexts = {
      studio: {
        title: "STUDIO",
        html:
          "<p><strong>Interferenze:</strong> sovrapposizione nello stesso luogo o nello stesso arco temporale di attività lavorative diverse che possono influire reciprocamente sui rischi e sulle prestazioni, generando interruzioni, errori o peggioramento della sicurezza.</p>" +

          "<p><strong>Presenze familiari:</strong> presenza di persone non lavoratrici, familiari, conviventi, ospiti, nello stesso ambiente di lavoro agile la cui vicinanza o intervento può modificare il contesto operativo e aumentare i rischi di disturbo o intralcio.</p>" +

          "<p><strong>Distrazioni:</strong> stimoli esterni o interni, rumori, richieste verbali, dispositivi personali, attività domestiche, che sottraggono attenzione al lavoratore, riducendo concentrazione e aumentando la probabilità di errori.</p>" +

          "<p><strong>Postazione non idonea:</strong> luogo o attrezzatura di lavoro non conformi ai requisiti ergonomici o di sicurezza, sedia o scrivania inadeguata, schermo mal posizionato, illuminazione scarsa, impianto elettrico non conforme, che possono causare disturbi muscolo-scheletrici, affaticamento visivo o rischi elettrici.</p>"
      },

      bagno: {
        title: "BAGNO",
        html:
          "<p>Nel bagno la presenza di acqua, pavimenti bagnati, prese elettriche e dispositivi come phon o caricabatterie può determinare condizioni di rischio elettrico, scivolamento e caduta, soprattutto in caso di distrazione.</p>"
      },

      cucina: {
        title: "CUCINA",
        html:
          "<p>In cucina la sovrapposizione tra attività domestiche e lavoro può generare distrazioni, interferenze, rischio di urti, scottature, tagli o contatto accidentale con liquidi e superfici calde. La presenza di alimenti vicino ai dispositivi può inoltre danneggiare la postazione.</p>"
      },

      salotto: {
        title: "SALOTTO",
        html:
          "<p>Nel salotto la presenza contemporanea di lavoro digitale, vita domestica, bambini e attività di assistenza può generare rischio da interferenza. Attività diverse si sovrappongono nello stesso spazio, aumentando distrazione, interruzioni, urti, inciampi e difficoltà di controllo dell’ambiente.</p>"
      },

      giardino: {
        title: "GIARDINO",
        html:
          "<p>Nel giardino o negli spazi esterni il lavoro può essere condizionato da luce diretta, abbagliamento, calore, superfici instabili, insetti, elementi biologici e distrazioni ambientali. La postazione può risultare meno stabile e meno protetta rispetto a uno spazio interno.</p>"
      },

      seminterrato: {
        title: "SEMINTERRATO",
        html:
          "<p>Nel seminterrato possono essere presenti rischi legati a scarsa illuminazione, umidità, muffa, materiali depositati, percorsi ingombri, cavi, scale e difficoltà di aerazione. L’ambiente può aumentare il rischio di inciampo, caduta e riduzione del comfort lavorativo.</p>"
      }
    };

    const target = document.getElementById("target");
    const hint = document.getElementById("hint");
    const buttonLayer = document.getElementById("buttonLayer");
    const riskBox = document.getElementById("riskBox");
    const riskTitle = document.getElementById("riskTitle");
    const riskText = document.getElementById("riskText");

    function openRisk(key) {
      const risk = riskTexts[key];

      riskTitle.innerText = risk.title;
      riskText.innerHTML = risk.html;

      riskBox.scrollTop = 0;
      riskBox.style.display = "block";
      buttonLayer.style.display = "none";
      hint.style.display = "none";
    }

    function closeRisk() {
      riskBox.style.display = "none";
      buttonLayer.style.display = "grid";
      hint.style.display = "block";
      hint.innerText = "Tocca un ambiente";
    }

    target.addEventListener("targetFound", function () {
      hint.innerText = "Tocca un ambiente";
      hint.style.display = "block";
      buttonLayer.style.display = "grid";
    });

    target.addEventListener("targetLost", function () {
      hint.innerText = "Inquadra di nuovo il roll-up";
      hint.style.display = "block";
      buttonLayer.style.display = "none";
      riskBox.style.display = "none";
    });
  </script>

</body>
</html>
