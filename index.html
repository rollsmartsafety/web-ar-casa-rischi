<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web AR Casa Rischi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 92%;
      max-width: 460px;
      z-index: 999;
      display: none;
    }

    #buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .risk-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: bold;
      background: white;
      color: #111;
      font-size: 13px;
    }

    #infoBox {
      display: none;
      background: rgba(0,0,0,0.86);
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.4;
    }

    #infoTitle {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }

    #closeBtn {
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div id="controls">
<div id="buttons">
</div>

    <div id="infoBox">
      <div id="infoTitle"></div>
      <div id="infoText"></div>
      <button id="closeBtn" onclick="chiudiScheda()">Chiudi</button>
    </div>
  </div>

<a-scene 
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  cursor="rayOrigin: mouse"
  raycaster="objects: [id^=hotspot]">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <a-plane id="hotspot-bambina"
        class="clickable"
         color="red"
         opacity="0"
         width="0.18"
         height="0.18"
         position="-0.42 0.18 0">
</a-plane>

      <!-- HIGHLIGHT BOX -->

<a-plane id="box1" color="yellow" opacity="0" width="0.6" height="0.4" position="-0.38 0.24 0"></a-plane>
<a-plane id="box2" color="yellow" opacity="0" width="0.6" height="0.4" position="0.38 0.24 0"></a-plane>

<a-plane id="box3" color="yellow" opacity="0" width="0.6" height="0.4" position="-0.38 0.02 0"></a-plane>
<a-plane id="box4" color="yellow" opacity="0" width="0.6" height="0.4" position="0.38 0.02 0"></a-plane>

<a-plane id="box5" color="yellow" opacity="0" width="0.6" height="0.4" position="-0.38 -0.20 0"></a-plane>
<a-plane id="box6" color="yellow" opacity="0" width="0.6" height="0.4" position="0.38 -0.20 0"></a-plane>

  
    </a-entity>

  </a-scene>

  <script>
    const controls = document.getElementById("controls");
    const infoBox = document.getElementById("infoBox");
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const target = document.getElementById("target");

  function resetBox() {
  for (let i = 1; i <= 6; i++) {
    document.getElementById("box"+i).setAttribute("opacity", "0");
  }
}

function apriScheda(titolo, testo, box) {
  resetBox();
  document.getElementById("box"+box).setAttribute("opacity", "0.3");

  infoTitle.textContent = titolo;
  infoText.textContent = testo;
  infoBox.style.display = "block";
}

    function chiudiScheda() {
      infoBox.style.display = "none";
    }
document.getElementById("hotspot-bambina").addEventListener("click", () => {
  apriScheda(
    "Interferenze lavoro-famiglia",
    "La presenza di bambini durante il lavoro agile può ridurre la concentrazione, aumentare il rischio di errori e generare stress. La sovrapposizione dei ruoli può portare a minore vigilanza, possibili danni fisici ai dispositivi e perdita accidentale di dati aziendali.",
    1
  );
});
    target.addEventListener("targetFound", () => {
      controls.style.display = "block";
    });

    target.addEventListener("targetLost", () => {
      controls.style.display = "none";
      infoBox.style.display = "none";
    });
  </script>

</body>
</html>
