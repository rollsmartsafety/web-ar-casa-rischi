<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web AR Casa Rischi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 92%;
      max-width: 460px;
      z-index: 999;
      display: none;
    }

    #buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .risk-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: bold;
      background: white;
      color: #111;
      font-size: 13px;
    }

    #infoBox {
      display: none;
      background: rgba(0,0,0,0.86);
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.4;
    }

    #infoTitle {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }

    #closeBtn {
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div id="controls">
    <div id="buttons">
      <button class="risk-btn" onclick="apriScheda('Rischio domestico', 'Oggetti instabili, distrazioni e spazi non organizzati possono aumentare il rischio di urti, cadute e piccoli infortuni durante il lavoro agile.')">Rischio domestico</button>

      <button class="risk-btn" onclick="apriScheda('Rischio elettrico', 'Dispositivi elettrici, prese e cavi vicino ad acqua o superfici bagnate aumentano il rischio elettrico.')">Rischio elettrico</button>

      <button class="risk-btn" onclick="apriScheda('Cucina', 'Cucinare mentre si lavora o si guarda il cellulare può causare distrazioni, ustioni, tagli e inciampi.')">Cucina</button>

      <button class="risk-btn" onclick="apriScheda('Postura', 'Lavorare da divano, letto o con il portatile sulle gambe favorisce posture scorrette e affaticamento muscolo-scheletrico.')">Postura</button>

      <button class="risk-btn" onclick="apriScheda('Giardino', 'Giochi, cavi e oggetti lasciati a terra possono diventare ostacoli e causare inciampi.')">Giardino</button>

      <button class="risk-btn" onclick="apriScheda('Scale', 'Oggetti sui gradini e disattenzione aumentano il rischio di inciampo e caduta.')">Scale</button>
    </div>

    <div id="infoBox">
      <div id="infoTitle"></div>
      <div id="infoText"></div>
      <button id="closeBtn" onclick="chiudiScheda()">Chiudi</button>
    </div>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <!-- Etichette AR sulla griglia 2x3 -->
      <a-text value="RISCHIO DOMESTICO" color="#ffffff" align="center" width="2" position="-0.38 0.24 0"></a-text>
      <a-text value="RISCHIO ELETTRICO" color="#ffffff" align="center" width="2" position="0.38 0.24 0"></a-text>

      <a-text value="CUCINA" color="#ffff00" align="center" width="2" position="-0.38 0.02 0"></a-text>
      <a-text value="POSTURA" color="#ffff00" align="center" width="2" position="0.38 0.02 0"></a-text>

      <a-text value="GIARDINO" color="#ff9900" align="center" width="2" position="-0.38 -0.20 0"></a-text>
      <a-text value="SCALE" color="#ff9900" align="center" width="2" position="0.38 -0.20 0"></a-text>

    </a-entity>

  </a-scene>

  <script>
    const controls = document.getElementById("controls");
    const infoBox = document.getElementById("infoBox");
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const target = document.getElementById("target");

    function apriScheda(titolo, testo) {
      infoTitle.textContent = titolo;
      infoText.textContent = testo;
      infoBox.style.display = "block";
    }

    function chiudiScheda() {
      infoBox.style.display = "none";
    }

    target.addEventListener("targetFound", () => {
      controls.style.display = "block";
    });

    target.addEventListener("targetLost", () => {
      controls.style.display = "none";
      infoBox.style.display = "none";
    });
  </script>

</body>
</html>
